<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zuli - Agendamento Profissional</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f2f2f2;
}

header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav button{
    margin:5px;
    padding:10px;
    border:none;
    background:#00aaff;
    color:white;
    cursor:pointer;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:20px;
}

</style>

</head>
<body>

<header>
<h2>Zuli</h2>
<p>Agendamento profissional de serviços</p>
</header>


<nav>

<button onclick="mostrar('login')">Login</button>
<button onclick="mostrar('cadastro')">Cadastro</button>
<button onclick="mostrar('servicos')">Serviços</button>
<button onclick="mostrar('agenda')">Agenda</button>

</nav>


<div class="container">


<div id="login" class="card">

<h3>Login</h3>

<input id="login_usuario" placeholder="Usuário">
<input id="login_senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>



<div id="cadastro" class="card" style="display:none">

<h3>Cadastro</h3>

<input id="cad_usuario" placeholder="Usuário">
<input id="cad_senha" placeholder="Senha">

<button onclick="cadastro()">Cadastrar</button>

</div>



<div id="servicos" class="card" style="display:none">

<h3>Serviços disponíveis</h3>

<select id="servico">

<option>Corte</option>
<option>Barba</option>
<option>Sobrancelha</option>

</select>

<button onclick="irAgenda()">Agendar</button>

</div>



<div id="agenda" class="card" style="display:none">

<h3>Escolher horário</h3>

<input type="date" id="data">
<input type="time" id="hora">

<button onclick="agendar()">Confirmar</button>

</div>


</div>


<footer>

Zuli © 2026  
Sistema profissional de agendamento

</footer>


<script>

function mostrar(id){

document.getElementById("login").style.display="none"
document.getElementById("cadastro").style.display="none"
document.getElementById("servicos").style.display="none"
document.getElementById("agenda").style.display="none"

document.getElementById(id).style.display="block"

}



function login(){

fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usuario:login_usuario.value,
senha:login_senha.value
})
})
.then(r=>r.json())
.then(d=>alert(d.status))

}



function cadastro(){

fetch("/cadastro",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usuario:cad_usuario.value,
senha:cad_senha.value
})
})
.then(r=>r.json())
.then(d=>alert(d.status))

}



function irAgenda(){

mostrar("agenda")

}



function agendar(){

fetch("/agendar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
data:data.value,
hora:hora.value
})
})
.then(r=>r.json())
.then(d=>alert(d.status))

}

</script>


</body>
</html>
